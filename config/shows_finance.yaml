group: finance

shows:
  - slug: animal-spirits
    name: "Animal Spirits"
    publisher: The Compound
    rss_url: "https://feeds.megaphone.fm/TCP6464651487"
    format: deep-dive
    typical_length_min: 60
    cadence: weekly
    web_transcript:
      enabled: false

  - slug: the-bid
    name: "The Bid"
    publisher: BlackRock
    rss_url: "https://rss.art19.com/the-bid"
    format: analytical
    typical_length_min: 30
    cadence: weekly
    web_transcript:
      enabled: false

  - slug: money-for-couples
    name: "Money for Couples"
    publisher: Ramit Sethi
    rss_url: "https://feeds.megaphone.fm/IWTYB6912370287"
    format: deep-dive
    typical_length_min: 45
    cadence: weekly
    web_transcript:
      enabled: false

  - slug: washingtonwise
    name: "WashingtonWise"
    publisher: Charles Schwab
    rss_url: "https://feeds.schwab.com/washingtonwise"
    format: analytical
    typical_length_min: 30
    cadence: weekly
    web_transcript:
      enabled: false

  - slug: planet-money
    name: "Planet Money"
    publisher: NPR
    rss_url: "https://feeds.npr.org/510289/podcast.xml"
    format: analytical
    typical_length_min: 25
    cadence: weekly
    # Publishes Wed + Fri; Friday episode timing unreliable at 9am PT —
    # 7-day window ensures Wednesday episode is always captured
    web_transcript:
      enabled: false

  - slug: odd-lots
    name: "Odd Lots"
    publisher: Bloomberg
    rss_url: "https://omnycontent.com/d/playlist/e73c998e-6e60-432f-8610-ae210140c5b1/8A94442E-5A74-4FA2-8B8D-AE27003A8D6B/982F5071-765C-403D-969D-AE27003A8D83/podcast.rss"
    format: deep-dive
    typical_length_min: 60
    cadence: weekly
    # Publishes Mon + Thu ~09:00 UTC; Thursday episode reliably available by Friday 9am PT
    web_transcript:
      enabled: false

  - slug: we-study-billionaires
    name: "We Study Billionaires"
    publisher: The Investor's Podcast Network
    rss_url: "https://feeds.megaphone.fm/PPLLC8974708240"
    format: deep-dive
    typical_length_min: 60
    cadence: weekly
    # Multi-series feed (TIP / BTC / RWH sub-shows); drops Tue/Wed/Sat —
    # Saturday episode won't be available Friday but 7-day window catches it the following week
    web_transcript:
      enabled: false

transcription:
  engine: faster-whisper
  model: tiny
  cleanup_audio: true

analysis:
  provider: anthropic
  model: claude-sonnet-4-6
  synthesis_model: claude-opus-4-6
  prompt_file: config/prompt_finance.md
  max_tokens: 4096
  history_days: 49   # weekly pipeline — 7 weeks of briefing context
  stale_days: 98     # drop story threads not seen in 14 weeks

delivery:
  method: email
  output_dir: data/briefings
  claude_prompt_file: config/prompt_claude_finance.md

schedule:
  cron: "0 9 * * 5"   # Fri 9am PT (Pi local time, DST-aware) — 3h before tech run
