group: parenting

shows:
  - slug: good-inside
    name: "Good Inside with Dr. Becky"
    publisher: Good Inside
    rss_url: "https://feeds.simplecast.com/Y5N0xWWZ"
    format: deep-dive
    typical_length_min: 45
    cadence: weekly
    web_transcript:
      enabled: false

  - slug: respectful-parenting
    name: "Respectful Parenting: Janet Lansbury Unruffled"
    publisher: JLML Press
    rss_url: "https://feeds.megaphone.fm/ADL8169230773"
    format: analytical
    typical_length_min: 30
    cadence: weekly
    web_transcript:
      enabled: false

transcription:
  engine: faster-whisper
  model: tiny
  cleanup_audio: true

analysis:
  provider: anthropic
  model: claude-sonnet-4-6
  synthesis_model: claude-opus-4-6
  prompt_file: config/prompt_parenting.md
  max_tokens: 4096
  history_days: 49   # weekly pipeline — 7 weeks of briefing context
  stale_days: 98     # drop story threads not seen in 14 weeks

delivery:
  method: email
  output_dir: data/briefings
  claude_prompt_file: config/prompt_claude_parenting.md

schedule:
  cron: "0 14 * * 2"  # Tue 2pm UTC / 6am PT — both shows publish Tuesday mornings UTC
