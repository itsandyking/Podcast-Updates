    web_transcript:
      enabled: false

  - slug: la-times-headlines
    name: "Headlines From The Times"
    publisher: "L.A. Times"
    rss_url: "https://feeds.simplecast.com/_lj7xUNU"
    format: survey
    typical_length_min: 9
    afternoon_release: true
    web_transcript:
      enabled: false

  - slug: apple-news-today
    name: "Apple News Today"
    publisher: Apple News
    rss_url: "https://apple.news/podcast/apple_news_today"
    format: survey
    typical_length_min: 14
    web_transcript:
      enabled: false

  - slug: marketplace
    name: "Marketplace"
    publisher: "APM"
    rss_url: "https://www.marketplace.org/feed/podcast/marketplace"
    format: analytical
    typical_length_min: 25
    afternoon_release: true
