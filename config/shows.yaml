  - slug: wsj-take-on-the-week
    name: "WSJ's Take on the Week"
    publisher: WSJ
    rss_url: "https://video-api.wsj.com/podcast/rss/wsj/take-on-the-week"
    format: deep-dive
    typical_length_min: 31
    web_transcript:
      enabled: false

transcription:
  engine: faster-whisper  # moonshine | faster-whisper | whisper-api
  model: tiny             # tiny | base | small | medium
  cleanup_audio: true     # Delete MP3s after transcription

analysis:
  provider: anthropic
  model: claude-sonnet-4-6
  synthesis_model: claude-opus-4-6
  prompt_file: config/prompt.md
  max_tokens: 4096
  history_days: 7    # daily pipeline — 1 week of briefing context
  stale_days: 14     # drop story threads not seen in 2 weeks

delivery:
  method: email           # file | email
  output_dir: data/briefings

schedule:
  cron: "0 7 * * 1-6"    # 7am PT, Mon-Sat
