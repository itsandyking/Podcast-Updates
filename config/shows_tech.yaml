group: tech

shows:
  - slug: hard-fork
    name: "Hard Fork"
    publisher: NYT
    rss_url: "https://feeds.simplecast.com/l2i9YnTd"
    format: deep-dive
    typical_length_min: 60
    cadence: weekly
    web_transcript:
      enabled: false

  - slug: 404-media
    name: "404 Media"
    publisher: 404 Media
    rss_url: "https://feeds.megaphone.fm/TBIEA2761282490"
    format: analytical
    typical_length_min: 45
    cadence: weekly
    web_transcript:
      enabled: false

  - slug: decoder
    name: "Decoder"
    publisher: The Verge
    rss_url: "https://feeds.megaphone.fm/recodedecode"
    format: deep-dive
    typical_length_min: 60
    cadence: weekly
    web_transcript:
      enabled: false

  - slug: pivot
    name: "Pivot"
    publisher: Vox Media
    rss_url: "https://feeds.megaphone.fm/pivot"
    format: deep-dive
    typical_length_min: 60
    cadence: weekly
    # Publishes Tue + Fri ~10:00 UTC; Friday episode available before noon PT pipeline run
    web_transcript:
      enabled: false

  - slug: big-technology
    name: "Big Technology"
    publisher: Big Technology
    rss_url: "https://feeds.megaphone.fm/LI3617121267"
    format: analytical
    typical_length_min: 45
    cadence: weekly
    # Publishes Wed/Fri ~16:00–22:00 UTC; Friday episode may drop after noon PT —
    # if missed it will be caught the following week via 7-day cadence window
    web_transcript:
      enabled: false

transcription:
  engine: faster-whisper
  model: base
  cleanup_audio: true

analysis:
  provider: anthropic
  model: claude-sonnet-4-6
  synthesis_model: claude-opus-4-6
  prompt_file: config/prompt_tech.md
  max_tokens: 4096
  history_days: 49   # weekly pipeline — 7 weeks of briefing context
  stale_days: 98     # drop story threads not seen in 14 weeks

delivery:
  method: email
  output_dir: data/briefings
  claude_prompt_file: config/prompt_claude_tech.md

schedule:
  cron: "0 17 * * 5"  # Fri 5pm PT (Pi local time, DST-aware) — after Hard Fork/Pivot/Big Technology all drop
